name: Product Site

on:
  push:
    branches:
      - main
    paths:
      - "site/**"
      - "scripts/build-product-site.mjs"
      - "docs/assets/**"
      - "apps/desktop/build/icon-source.svg"
      - "apps/desktop/src/renderer/src/assets/tongluv/frames/**"
      - "package.json"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: chroni-product-site
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
      - name: Build product site
        run: node scripts/build-product-site.mjs
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist/site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy product site
        id: deployment
        uses: actions/deploy-pages@v5
