name: Desktop Release Builds

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  package-windows:
    runs-on: windows-latest
    env:
      CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run check
      - run: pnpm run package:desktop
      - uses: actions/upload-artifact@v4
        with:
          name: chroni-windows-${{ github.ref_name }}
          path: |
            apps/desktop/dist-electron/*.exe
            apps/desktop/dist-electron/*.yml
            apps/desktop/dist-electron/*.blockmap
          if-no-files-found: error
          retention-days: 14

  package-macos:
    runs-on: macos-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run check
      - run: pnpm run package:desktop
      - uses: actions/upload-artifact@v4
        with:
          name: chroni-macos-${{ github.ref_name }}
          path: |
            apps/desktop/dist-electron/*.dmg
            apps/desktop/dist-electron/*.zip
            apps/desktop/dist-electron/*.blockmap
          if-no-files-found: error
          retention-days: 14
