name: Desktop Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: chroni-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package-windows:
    name: Windows x64
    runs-on: windows-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    env:
      CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}
      CHRONI_REQUIRE_SIGNING: ${{ vars.CHRONI_REQUIRE_SIGNING || '0' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Verify release version
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            node scripts/verify-release-version.mjs "${{ github.ref_name }}"
          } else {
            node scripts/verify-release-version.mjs
          }
      - run: pnpm install --frozen-lockfile
      - run: pnpm run check
      - run: pnpm run package:windows
      - name: Generate Windows checksums
        run: node scripts/generate-checksums.mjs apps/desktop/dist-electron apps/desktop/dist-electron/SHA256SUMS-windows.txt
      - name: Attest Windows packages
        if: github.ref_type == 'tag'
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: |
            apps/desktop/dist-electron/*.exe
            apps/desktop/dist-electron/*.yml
            apps/desktop/dist-electron/*.blockmap
      - uses: actions/upload-artifact@v4
        with:
          name: chroni-windows-${{ github.ref_name }}
          path: |
            apps/desktop/dist-electron/*.exe
            apps/desktop/dist-electron/*.yml
            apps/desktop/dist-electron/*.blockmap
            apps/desktop/dist-electron/SHA256SUMS-windows.txt
          if-no-files-found: error
          retention-days: 30

  package-macos:
    name: macOS Universal
    runs-on: macos-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    env:
      CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
      MAC_APPLE_API_KEY: ${{ secrets.MAC_APPLE_API_KEY }}
      APPLE_API_KEY_ID: ${{ secrets.MAC_APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.MAC_APPLE_API_ISSUER }}
      APPLE_ID: ${{ secrets.MAC_APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.MAC_APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.MAC_APPLE_TEAM_ID }}
      CHRONI_REQUIRE_SIGNING: ${{ vars.CHRONI_REQUIRE_SIGNING || '0' }}
      CHRONI_REQUIRE_NOTARIZATION: ${{ vars.CHRONI_REQUIRE_NOTARIZATION || '0' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Verify release version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            node scripts/verify-release-version.mjs "${{ github.ref_name }}"
          else
            node scripts/verify-release-version.mjs
          fi
      - name: Prepare App Store Connect API key
        if: env.MAC_APPLE_API_KEY != ''
        run: |
          printf '%s' "$MAC_APPLE_API_KEY" > "$RUNNER_TEMP/AuthKey.p8"
          echo "APPLE_API_KEY=$RUNNER_TEMP/AuthKey.p8" >> "$GITHUB_ENV"
      - run: pnpm install --frozen-lockfile
      - run: pnpm run check
      - run: pnpm run package:macos
      - name: Generate macOS checksums
        run: node scripts/generate-checksums.mjs apps/desktop/dist-electron apps/desktop/dist-electron/SHA256SUMS-macos.txt
      - name: Attest macOS packages
        if: github.ref_type == 'tag'
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: |
            apps/desktop/dist-electron/*.dmg
            apps/desktop/dist-electron/*.zip
            apps/desktop/dist-electron/*.yml
            apps/desktop/dist-electron/*.blockmap
      - uses: actions/upload-artifact@v4
        with:
          name: chroni-macos-${{ github.ref_name }}
          path: |
            apps/desktop/dist-electron/*.dmg
            apps/desktop/dist-electron/*.zip
            apps/desktop/dist-electron/*.yml
            apps/desktop/dist-electron/*.blockmap
            apps/desktop/dist-electron/SHA256SUMS-macos.txt
          if-no-files-found: error
          retention-days: 30

  publish-release:
    name: Publish GitHub Release
    if: github.ref_type == 'tag'
    needs: [package-windows, package-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: chroni-*-${{ github.ref_name }}
          path: release
          merge-multiple: true
      - name: Generate combined checksums
        run: node scripts/generate-checksums.mjs release release/SHA256SUMS.txt
      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          prerelease=""
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then prerelease="--prerelease"; fi
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" release/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" release/* \
              --title "Chroni ${GITHUB_REF_NAME}" \
              --generate-notes \
              $prerelease
          fi
