name: 问题报告
description: 报告可复现的 Chroni 功能或界面问题
title: "[Bug] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: 安全漏洞请不要在这里公开，请按照 SECURITY.md 私密报告。
  - type: input
    id: version
    attributes:
      label: Chroni 版本
      placeholder: 例如 0.1.0
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: 操作系统
      options:
        - Windows 11
        - Windows 10
        - macOS Apple Silicon
        - macOS Intel
        - Linux / 其他
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 说明实际结果、预期结果和影响。
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. 打开...
        2. 拖入...
        3. 看到...
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: 日志与截图
      description: 请先移除 API Key、真实日程、文件路径和个人信息。
  - type: checkboxes
    id: checks
    attributes:
      label: 提交确认
      options:
        - label: 我已经搜索现有 Issue，并确认没有重复报告。
          required: true
        - label: 我已经移除敏感信息。
          required: true
