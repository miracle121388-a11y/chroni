appId: app.chroni.desktop
productName: Chroni
executableName: Chroni
copyright: Copyright © 2026 Chroni

directories:
  output: dist-electron

artifactName: Chroni-${version}-${os}-${arch}.${ext}

files:
  - dist/**
  - third_party/**
  - preload.cjs
  - package.json

asar: true
npmRebuild: false
publish: null

mac:
  category: public.app-category.productivity
  target:
    - dmg
    - zip
  identity: "-"
  hardenedRuntime: false
  gatekeeperAssess: false

win:
  icon: src/renderer/src/assets/tongluv/frames/idle/0000.png
  target:
    - nsis
    - portable
  verifyUpdateCodeSignature: false

nsis:
  artifactName: Chroni-${version}-win-${arch}-setup.${ext}
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

portable:
  artifactName: Chroni-${version}-win-${arch}-portable.${ext}

linux:
  target:
    - AppImage
    - deb
    - tar.gz
  category: Utility
  maintainer: Chroni
